# FILE: action.yml
# Root of validate-urdf-action repository.
#
# ROOT CAUSE OF ALL PREVIOUS FAILURES:
#   The API returns: { "data": null, "message": "Error1 | Error2" }
#   for invalid URDFs (HTTP 400).
#
#   Python's dict.get("data", {}) returns None (not {}) when the key EXISTS
#   with a null value. The default {} only applies when the key is MISSING.
#   Then "isValid" in None raises TypeError, caught silently, re-raising the
#   original RoboInfraError — so sys.exit(1) was always called regardless of
#   fail-on-invalid setting.
#
# THE CORRECT FIX:
#   Remove the SDK entirely from this action.
#   Make the HTTP call directly with requests (pre-installed on GitHub runners).
#   Handle HTTP 200 (valid URDF) and HTTP 400 (invalid URDF) identically —
#   both are validation results, not errors.
#
#   This approach has zero dependency on SDK version or PyPI state.
#   It will never break due to an SDK update.

name: 'RoboInfra URDF Validator'
description: 'Validate ROS URDF files using the RoboInfra API. Fails CI if URDF has structural errors.'
author: 'RoboInfra'

branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  api-key:
    description: 'Your RoboInfra API key (starts with rk_). Store this as a GitHub secret.'
    required: true

  file:
    description: 'Path to the URDF file to validate, relative to the repo root. Example: urdf/robot.urdf'
    required: true

  fail-on-invalid:
    description: 'Set to false to allow the workflow to continue even if URDF is invalid (prints errors but does not fail).'
    required: false
    default: 'true'

  analyze:
    description: 'Also run kinematic analysis (requires Basic or Pro plan). Returns DOF, end effectors, joint chain.'
    required: false
    default: 'false'

outputs:
  is-valid:
    description: 'true if the URDF passed all 9 structural checks, false otherwise.'
    value: ${{ steps.validate.outputs.is_valid }}

  errors:
    description: 'Comma-separated list of validation errors. Empty string if valid.'
    value: ${{ steps.validate.outputs.errors }}

  dof:
    description: 'Degrees of freedom (only set when analyze=true and plan allows it).'
    value: ${{ steps.validate.outputs.dof }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install requests
      shell: bash
      run: pip install requests --quiet

    - name: Validate URDF
      id: validate
      shell: python
      env:
        ROBOINFRA_API_KEY: ${{ inputs.api-key }}
        URDF_FILE: ${{ inputs.file }}
        FAIL_ON_INVALID: ${{ inputs.fail-on-invalid }}
        RUN_ANALYZE: ${{ inputs.analyze }}
      run: |
        import os
        import sys
        import json
        import requests

        API_BASE      = "https://roboinfra-api.azurewebsites.net"
        api_key       = os.environ["ROBOINFRA_API_KEY"]
        urdf_file     = os.environ["URDF_FILE"]
        fail_on_invalid = os.environ.get("FAIL_ON_INVALID", "true").lower() == "true"
        run_analyze   = os.environ.get("RUN_ANALYZE", "false").lower() == "true"
        github_output = os.environ.get("GITHUB_OUTPUT", "")

        HEADERS = {"X-Api-Key": api_key}

        # ── 1. Check file exists ─────────────────────────────────────────────
        if not os.path.isfile(urdf_file):
            print(f"::error::URDF file not found: {urdf_file}")
            print(f"::error::Check that the path is relative to the repository root.")
            sys.exit(1)

        # ── 2. Call the API directly ─────────────────────────────────────────
        print("::group::RoboInfra URDF Validation")
        print(f"  File   : {urdf_file}")

        try:
            with open(urdf_file, "rb") as f:
                resp = requests.post(
                    f"{API_BASE}/api/urdf/validate",
                    headers=HEADERS,
                    files={"file": (os.path.basename(urdf_file), f)},
                    timeout=30
                )
        except requests.exceptions.ConnectionError:
            print("::error::Cannot connect to RoboInfra API. Check your internet connection.")
            print("::endgroup::")
            sys.exit(1)
        except requests.exceptions.Timeout:
            print("::error::Request timed out. The API may be temporarily unavailable.")
            print("::endgroup::")
            sys.exit(1)

        # ── 3. Handle auth/quota errors (always fatal) ───────────────────────
        if resp.status_code == 401:
            print("::error::Invalid or revoked API key. Check your ROBOINFRA_API_KEY secret.")
            print("::endgroup::")
            sys.exit(1)

        if resp.status_code == 429:
            print("::error::Monthly quota exceeded. Upgrade at https://roboinfra-dashboard.azurewebsites.net/subscription")
            print("::endgroup::")
            sys.exit(1)

        if resp.status_code >= 500:
            print(f"::error::RoboInfra server error (HTTP {resp.status_code}). Retry in 30 seconds.")
            print("::endgroup::")
            sys.exit(1)

        # ── 4. Parse the validation result ───────────────────────────────────
        # HTTP 200 = URDF valid.    body.data.isValid = true,  errors = []
        # HTTP 400 = URDF invalid.  body.data = null,  body.message = "Err1 | Err2"
        #
        # BOTH are validation results — neither is a fatal error.
        # We handle them identically here.
        try:
            body = resp.json()
        except Exception:
            print(f"::error::Unexpected response from API (HTTP {resp.status_code}): {resp.text[:200]}")
            print("::endgroup::")
            sys.exit(1)

        # data is null for invalid URDFs, a dict for valid URDFs
        data = body.get("data") or {}

        is_valid = data.get("isValid", False)

        # Prefer data.errors list; fall back to splitting the message field on "|"
        errors = data.get("errors") or []
        if not errors and not is_valid:
            msg = body.get("message", "Validation failed")
            errors = [p.strip() for p in msg.split("|") if p.strip()]

        # ── 5. Write step outputs ────────────────────────────────────────────
        if github_output:
            with open(github_output, "a") as gf:
                gf.write(f"is_valid={'true' if is_valid else 'false'}\n")
                gf.write(f"errors={','.join(errors)}\n")

        # ── 6. Print results ─────────────────────────────────────────────────
        if is_valid:
            print("  Result : VALID - all 9 structural checks passed")
        else:
            print(f"  Result : INVALID - {len(errors)} error(s) found")
            for i, err in enumerate(errors, 1):
                print(f"    {i}. {err}")
                print(f"::error file={urdf_file}::{err}")

        # ── 7. Optional kinematic analysis ───────────────────────────────────
        dof = ""
        if run_analyze and is_valid:
            try:
                with open(urdf_file, "rb") as f:
                    ar = requests.post(
                        f"{API_BASE}/api/urdf/analyze",
                        headers=HEADERS,
                        files={"file": (os.path.basename(urdf_file), f)},
                        timeout=30
                    )

                if ar.status_code == 403:
                    print("::warning::Kinematic analysis requires Basic or Pro plan. Skipping.")
                elif ar.status_code == 200:
                    ad = (ar.json().get("data") or {})
                    dof = str(ad.get("dof", ""))
                    print(f"  Robot  : {ad.get('robotName', '')}")
                    print(f"  DOF    : {ad.get('dof', '')}")
                    print(f"  Links  : {ad.get('linkCount', '')}")
                    print(f"  Joints : {ad.get('jointCount', '')}")
                    ee = ad.get("endEffectors") or []
                    print(f"  End effectors: {', '.join(ee)}")
                else:
                    print(f"::warning::Analysis returned HTTP {ar.status_code}. Skipping.")
            except Exception as ae:
                print(f"::warning::Analysis failed: {ae}")

        if github_output:
            with open(github_output, "a") as gf:
                gf.write(f"dof={dof}\n")

        print("::endgroup::")

        # ── 8. Exit code ─────────────────────────────────────────────────────
        # Exit 1 ONLY when: URDF is invalid AND fail-on-invalid is true.
        # With fail-on-invalid=false: prints errors, writes outputs, exits 0.
        if not is_valid and fail_on_invalid:
            print("\nURDF validation failed. Fix the errors above before merging.")
            sys.exit(1)