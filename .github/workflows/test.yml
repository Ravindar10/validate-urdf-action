# FILE: .github/workflows/test.yml
# Self-tests for validate-urdf-action.
# Runs on every push to main and every pull request.

name: Test Action

# Fix Node.js 20 deprecation warning.
# actions/checkout and actions/setup-python internally use Node.js 20.
# This env variable opts into Node.js 24 now, eliminating the warning.
# Safe to remove once those actions ship Node.js 24 builds natively.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── TEST 1: Valid URDF should pass and set is-valid=true ─────────────────
  test-valid-urdf:
    name: Test — Valid URDF passes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create valid test URDF
        run: |
          printf '%s\n' \
            '<?xml version="1.0"?>' \
            '<robot name="test_arm">' \
            '  <link name="base_link"/>' \
            '  <link name="link_1"/>' \
            '  <link name="tool0"/>' \
            '  <joint name="joint_1" type="revolute">' \
            '    <parent link="base_link"/>' \
            '    <child link="link_1"/>' \
            '    <axis xyz="0 0 1"/>' \
            '    <limit effort="100" velocity="1.0" lower="-3.14" upper="3.14"/>' \
            '  </joint>' \
            '  <joint name="tool_joint" type="fixed">' \
            '    <parent link="link_1"/>' \
            '    <child link="tool0"/>' \
            '  </joint>' \
            '</robot>' > /tmp/valid.urdf
          echo "--- Created URDF ---"
          cat /tmp/valid.urdf

      - name: Validate valid URDF
        id: check
        uses: ./
        with:
          api-key: ${{ secrets.ROBOINFRA_API_KEY }}
          file: /tmp/valid.urdf

      - name: Assert is-valid=true
        run: |
          echo "is-valid: '${{ steps.check.outputs.is-valid }}'"
          if [ "${{ steps.check.outputs.is-valid }}" != "true" ]; then
            echo "FAIL: expected is-valid=true"
            exit 1
          fi
          echo "PASS"


  # ── TEST 2: Invalid URDF with fail-on-invalid=false must NOT fail the job ─
  # This was the failing test. Root cause was confirmed:
  #   API returns { "data": null, "message": "Err1 | Err2" } for invalid URDFs.
  #   Python dict.get("data", {}) returns None (not {}) when key exists with null.
  #   "isValid" in None raises TypeError, silently caught, re-raises RoboInfraError.
  #   The action always exited 1, even with fail-on-invalid=false.
  # Fix: removed SDK dependency. action.yml calls the API directly with requests.
  #   data = body.get("data") or {}  correctly handles null.
  test-invalid-urdf-report-mode:
    name: Test — Invalid URDF in report mode does not fail
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create invalid test URDF
        run: printf '<bad_root>not a robot</bad_root>\n' > /tmp/invalid.urdf

      # fail-on-invalid=false — the step must succeed (exit 0) even though URDF is invalid
      - name: Validate invalid URDF with fail-on-invalid=false
        id: check
        uses: ./
        with:
          api-key: ${{ secrets.ROBOINFRA_API_KEY }}
          file: /tmp/invalid.urdf
          fail-on-invalid: 'false'

      - name: Assert is-valid=false
        run: |
          echo "is-valid: '${{ steps.check.outputs.is-valid }}'"
          if [ "${{ steps.check.outputs.is-valid }}" != "false" ]; then
            echo "FAIL: expected is-valid=false for invalid URDF"
            exit 1
          fi
          echo "PASS: is-valid correctly set to false"

      - name: Assert errors output is populated
        run: |
          echo "errors: '${{ steps.check.outputs.errors }}'"
          if [ -z "${{ steps.check.outputs.errors }}" ]; then
            echo "FAIL: errors output should not be empty for invalid URDF"
            exit 1
          fi
          echo "PASS: errors output is populated"


  # ── TEST 3: Invalid URDF with default fail-on-invalid=true must fail ──────
  test-invalid-urdf-fails-by-default:
    name: Test — Invalid URDF fails by default
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create invalid test URDF
        run: printf '<bad_root>not a robot</bad_root>\n' > /tmp/invalid2.urdf

      - name: Validate invalid URDF (must fail — continue-on-error catches it)
        id: check
        uses: ./
        with:
          api-key: ${{ secrets.ROBOINFRA_API_KEY }}
          file: /tmp/invalid2.urdf
          fail-on-invalid: 'true'
        continue-on-error: true

      - name: Assert step outcome is failure
        run: |
          echo "outcome: '${{ steps.check.outcome }}'"
          if [ "${{ steps.check.outcome }}" != "failure" ]; then
            echo "FAIL: expected the action to fail for invalid URDF with fail-on-invalid=true"
            exit 1
          fi
          echo "PASS: action correctly failed"


  # ── TEST 4: Missing file must exit with clear error ───────────────────────
  test-missing-file-fails:
    name: Test — Missing file causes clear error
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate non-existent file (must fail)
        id: check
        uses: ./
        with:
          api-key: ${{ secrets.ROBOINFRA_API_KEY }}
          file: does-not-exist.urdf
        continue-on-error: true

      - name: Assert step outcome is failure
        run: |
          echo "outcome: '${{ steps.check.outcome }}'"
          if [ "${{ steps.check.outcome }}" != "failure" ]; then
            echo "FAIL: expected failure for missing file"
            exit 1
          fi
          echo "PASS: correctly failed for missing file"